trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: cloudopsacr12345
  imageName: cloudops-dashboard
  tag: $(Build.BuildId)

stages:

# =========================
# BUILD + PUSH IMAGE TO ACR
# =========================
- stage: Build
  displayName: Build and Push Docker Image

  jobs:
  - job: BuildPush

    steps:

    - task: Docker@2
      displayName: Build and Push to ACR

      inputs:
        containerRegistry: 'azure-subscription-connection'
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          latest
          $(tag)

# =========================
# DEPLOY TO AKS
# =========================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - deployment: DeployApp

    environment: aks

    strategy:
      runOnce:
        deploy:
          steps:

          - task: KubernetesManifest@1
            displayName: Deploy Kubernetes Manifests

            inputs:
              action: deploy
              kubernetesServiceConnection: aks-connection
              manifests: |
                k8s/deployment.yaml
                k8s/service.yaml