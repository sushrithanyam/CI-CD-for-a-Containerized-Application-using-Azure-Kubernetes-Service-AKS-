trigger:
- master

pool:
  vmImage: ubuntu-latest

variables:
  acrName: cloudopsacr12345
  imageName: cloudops-dashboard
  tag: $(Build.BuildId)

stages:

# =========================
# BUILD + PUSH IMAGE TO ACR
# =========================
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: BuildPush
    steps:

    # 🔴 IMPORTANT: pulls your repo into pipeline workspace
    - checkout: self

    # 🔴 DEBUG: confirms what files exist in pipeline
    - script: |
        echo "=== REPO INFO ==="
        pwd
        ls -R $(Build.SourcesDirectory)
      displayName: "DEBUG: workspace check"

    # Build + push image
    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        containerRegistry: 'acr-connection'
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          latest
          $(tag)

# =========================
# DEPLOY TO AKS
# =========================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - deployment: DeployApp
    environment: aks

    strategy:
      runOnce:
        deploy:
          steps:

          # 🔴 IMPORTANT: ensures repo is available in deploy stage too
          - checkout: self

          # Deploy manifests
          - task: KubernetesManifest@1
            displayName: Deploy Kubernetes Manifests
            inputs:
              action: deploy
              kubernetesServiceConnection: aks-connection
              manifests: |
                $(Build.SourcesDirectory)/k8s/deployment.yaml
                $(Build.SourcesDirectory)/k8s/service.yaml